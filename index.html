<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0d12">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Foosball">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Foosball Arcade</title>
    <link rel="icon" href="assets/icon_suite/foosball-arena.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icon_suite/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icon_suite/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon_suite/icon-180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="assets/icon_suite/icon-167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icon_suite/icon-152.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles/app.css">
  </head>
  <body>
    <main id="app" class="app">
      <canvas id="gameCanvas" aria-label="Foosball Arcade game board"></canvas>

      <section id="menu" class="menu overlay-panel" aria-label="Game setup">
        <div class="brand">
          <span class="eyebrow">First to 8 wins</span>
          <h1>Foosball Arcade</h1>
        </div>
        <div class="difficulty-row" role="group" aria-label="Choose difficulty">
          <button class="difficulty selected" data-difficulty="easy" type="button">
            <span>Easy</span>
          </button>
          <button class="difficulty" data-difficulty="medium" type="button">
            <span>Medium</span>
          </button>
          <button class="difficulty" data-difficulty="hard" type="button">
            <span>Hard</span>
          </button>
        </div>
        <button id="startButton" class="primary-action" type="button">Start Match</button>
      </section>

      <section id="endScreen" class="end-screen overlay-panel hidden" aria-label="Match complete">
        <span id="winnerLabel" class="eyebrow">Final</span>
        <h2 id="winnerTitle">Red Wins</h2>
        <button id="restartButton" class="primary-action" type="button">Play Again</button>
      </section>

      <section id="pauseScreen" class="pause-screen overlay-panel hidden" aria-label="Game paused">
        <span class="eyebrow">Paused</span>
        <h2>Foosball Arcade</h2>
        <div class="pause-actions">
          <button id="resumeButton" class="primary-action" type="button">Resume</button>
          <button id="exitButton" class="secondary-action" type="button">Exit to Menu</button>
        </div>
      </section>

      <div id="hud" class="hud hidden" aria-live="polite">
        <div class="score red-score">
          <span>RED</span>
          <strong id="redScore">0</strong>
        </div>
        <div id="statusText" class="status-text">Tap BALL to serve</div>
        <div class="score blue-score">
          <span>BLUE</span>
          <strong id="blueScore">0</strong>
        </div>
      </div>

      <button id="fullscreenButton" class="icon-button fullscreen-button" type="button" aria-label="Enter fullscreen" title="Fullscreen">
        <span aria-hidden="true"></span>
      </button>

      <button id="pauseButton" class="icon-button pause-button hidden" type="button" aria-label="Pause" title="Pause">
        <span aria-hidden="true"></span>
      </button>

      <button id="ballButton" class="ball-button hidden" type="button">BALL</button>

      <section id="rotateNotice" class="rotate-notice hidden" aria-label="Rotate device">
        <div>
          <h2>Turn Landscape</h2>
          <p>Foosball Arcade is built for a wide table view.</p>
        </div>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
